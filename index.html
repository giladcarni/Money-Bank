<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>בנק דור ויובל - מחובר לענן</title>
<style>
:root { --bg:#000; --text:#fff; --card:#1a1a1a; --border:#bb86fc; }
*{box-sizing:border-box;}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);margin:0;padding:10px;direction:rtl;}
.app-container{max-width:450px;margin:0 auto;background:var(--card);border-radius:20px;padding:15px;border:2px solid var(--border);min-height:90vh;display:flex;flex-direction:column;}
.screen{display:none;width:100%;}
.active{display:block;}

/* LOGIN */
.login-btn-container{display:flex;flex-direction:column;gap:15px;margin-top:30px;}
.name-btn{width:100%;padding:25px;border:none;border-radius:15px;font-size:2.2rem;font-weight:bold;cursor:pointer;color:white;display:block;text-align:center;}
.dor-btn{background:linear-gradient(135deg,#2ecc71,#27ae60);}
.yuval-btn{background:linear-gradient(135deg,#f39c12,#d35400);}

/* BALANCE */
#tip-box{background:rgba(255,215,0,.1);border:1px solid #ffd700;border-radius:12px;padding:8px;margin-bottom:8px;text-align:center;color:#ffd700;font-size:.85rem;min-height:45px;}
.balance-card{background:rgba(187,134,252,.1);padding:10px;border-radius:15px;margin-bottom:8px;border:1px solid var(--border);text-align:center;}
.amount{font-size:2.4rem;font-weight:bold;color:#bb86fc;}
.bar-bg{background:#333;height:22px;border-radius:15px;overflow:hidden;margin:5px 0;border:1px solid #444;}
.bar-fill{background:linear-gradient(90deg,#ffd700,#ff9800);height:100%;width:0%;display:flex;align-items:center;justify-content:center;font-weight:bold;color:#000;font-size:.75rem;}
.goal-controls{background:#222;padding:8px;border-radius:12px;margin-bottom:8px;}
input[type="range"]{width:100%;cursor:pointer;}

/* INPUTS */
input{width:100%;padding:10px;margin:4px 0;border:1px solid #444;border-radius:10px;background:#222;color:white;text-align:center;font-size:1rem;}
.action-btn{background:var(--border);color:#000;border:none;padding:12px;border-radius:10px;width:100%;font-size:1.1rem;font-weight:bold;cursor:pointer;}

/* CLOUD STATUS */
#cloud-status{background:#333;color:#ffd700;text-align:center;padding:5px;border-radius:8px;margin-bottom:10px;font-weight:bold;font-size:.9rem;}

/* PENDING */
#pending-section{border:1px dashed #ff4757;padding:8px;border-radius:10px;background:rgba(255,71,87,.05);margin-bottom:8px;}
.pending-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #333;font-size:.8rem;gap:6px;}
.pending-item:last-child{border-bottom:none;}
.pending-label{flex:1;color:#ff9f43;}
.pending-btns{display:flex;gap:4px;flex-shrink:0;}
.p-btn{border:none;border-radius:7px;padding:5px 10px;font-size:.75rem;font-weight:bold;cursor:pointer;}
.p-approve{background:#2ecc71;color:#000;}
.p-deny{background:#e74c3c;color:#fff;}
.p-edit{background:#3498db;color:#fff;}

/* PARENT AUTH INLINE */
.auth-row{display:flex;gap:5px;margin-top:6px;align-items:center;}
.auth-row input{margin:0;flex:1;font-size:.85rem;padding:7px;}
.auth-row button{flex-shrink:0;padding:7px 14px;font-size:.8rem;border:none;border-radius:8px;font-weight:bold;cursor:pointer;}

/* HISTORY */
.history-list{overflow-y:auto;margin-top:8px;border-top:1px solid #333;font-size:.8rem;max-height:260px;}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #222;gap:6px;}
.history-item:last-child{border-bottom:none;}
.h-label{flex:1;color:#ccc;}
.h-amount{font-weight:bold;flex-shrink:0;}
.h-edit{background:#3498db;color:#fff;border:none;border-radius:6px;padding:3px 8px;font-size:.7rem;cursor:pointer;flex-shrink:0;}
.plus{color:#2ecc71;} .minus{color:#ff4757;}

/* EDIT MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:999;}
.modal-overlay.open{display:flex;}
.modal-box{background:#1e1e1e;border:2px solid var(--border);border-radius:18px;padding:20px;width:90%;max-width:360px;}
.modal-title{font-size:1.1rem;font-weight:bold;margin-bottom:14px;color:#bb86fc;text-align:center;}
.modal-box input{margin-bottom:8px;}
.modal-btns{display:flex;gap:8px;margin-top:12px;}
.modal-btns button{flex:1;padding:10px;border:none;border-radius:10px;font-weight:bold;font-size:1rem;cursor:pointer;}
.modal-save{background:#2ecc71;color:#000;}
.modal-cancel{background:#444;color:#fff;}
</style>
</head>
<body>

<div class="app-container">
  <div id="cloud-status">מתחבר לענן... ☁️</div>

  <!-- LOGIN -->
  <div id="login-scr" class="screen active">
    <h2 style="text-align:center;margin:20px 0;">💰 בנק דור ויובל</h2>
    <div class="login-btn-container">
      <button class="name-btn dor-btn" onclick="preLogin('dor')">👦 דור</button>
      <button class="name-btn yuval-btn" onclick="preLogin('yuval')">👧 יובל</button>
    </div>
    <div id="pin-box" style="display:none;margin-top:20px;">
      <input type="password" id="pass-in" placeholder="סיסמת ילד" inputmode="numeric">
      <button class="action-btn" onclick="checkPass()" style="background:white;margin-top:10px;">כניסה 🚀</button>
    </div>
  </div>

  <!-- ACCOUNT -->
  <div id="acc-scr" class="screen">
    <div id="tip-box">💡 טוען טיפ חכם...</div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <button onclick="location.reload()" style="background:#444;border:none;color:white;padding:8px 12px;border-radius:8px;font-size:.8rem;cursor:pointer;">יציאה</button>
      <h3 id="hello-text" style="margin:0;">שלום</h3>
      <button class="action-btn" style="background:#9c27b0;color:white;width:auto;padding:8px 12px;font-size:.8rem;" onclick="requestInterest()">📈 ריבית</button>
    </div>

    <div class="balance-card">
      <div class="amount">₪ <span id="bal-val">0</span></div>
    </div>

    <div class="goal-controls">
      <div style="display:flex;justify-content:space-between;font-size:.75rem;">
        <span>יעד:</span>
        <input type="number" id="goal-input" style="width:80px;height:25px;margin:0;" oninput="syncGoalRange(this.value)">
      </div>
      <input type="range" id="goal-range" min="1000" max="20000" step="500" oninput="syncGoalInput(this.value)">
      <div class="bar-bg"><div id="bar-fill" class="bar-fill">0%</div></div>
    </div>

    <!-- PENDING -->
    <div id="pending-section" style="display:none;">
      <div style="font-size:.75rem;font-weight:bold;color:#ff4757;margin-bottom:6px;">⏳ ממתין לאישור הורה</div>
      <div id="pending-list"></div>
      <!-- global approve all — kept for convenience -->
      <div class="auth-row" style="margin-top:8px;">
        <input type="password" id="admin-pass-in" placeholder="סיסמת הורה לאישור הכל">
        <button style="background:#2ecc71;color:#000;" onclick="adminApproveAll()">✓ אשר הכל</button>
      </div>
    </div>

    <!-- ADD TRANSACTION -->
    <div style="background:rgba(255,255,255,.03);padding:10px;border-radius:12px;border:1px solid #333;margin-bottom:8px;">
      <div style="display:flex;gap:5px;">
        <input type="number" id="new-amt" placeholder="סכום" style="margin:0;">
        <input type="text" id="new-desc" placeholder="תיאור" style="margin:0;">
      </div>
      <div style="display:flex;gap:5px;margin-top:5px;">
        <button class="action-btn" style="background:#2ecc71;color:white;" onclick="update('plus')">הפקדה +</button>
        <button class="action-btn" style="background:#e74c3c;color:white;" onclick="update('minus')">משיכה -</button>
      </div>
    </div>

    <!-- HISTORY -->
    <div class="history-list" id="hist-view"></div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <div class="modal-title">✏️ עריכת רשומה</div>
    <input type="password" id="modal-pass" placeholder="סיסמת הורה" inputmode="numeric">
    <input type="number" id="modal-amt" placeholder="סכום">
    <input type="text" id="modal-desc" placeholder="תיאור">
    <div class="modal-btns">
      <button class="modal-save" onclick="saveEdit()">שמור</button>
      <button class="modal-cancel" onclick="closeModal()">ביטול</button>
    </div>
  </div>
</div>

<script>
const BIN_ID  = "6996e2fc43b1c97be98b0eb3";
const API_KEY = "$2a$10$o9q9zgegPj0cvFzAisYsduguETfd3RDxhMt7sCQTJFBjq2ZiEIYoi";
const ADMIN_PASS = "2910";

// ── STATE ──────────────────────────────────────────────
const INITIAL_DB = {
  dor:   { p:"1234", b:4936, g:10000, lastInt:"", h:[
    {d:"מטבעות חנוכה 138 ואנחנו 138",a:276,t:"plus",approved:true},
    {d:"דור פתיחה",a:1030,t:"plus",approved:true}
  ]},
  yuval: { p:"5678", b:2201, g:10000, lastInt:"", h:[
    {d:"יובל פתיחה",a:2201,t:"plus",approved:true}
  ]}
};
let db = INITIAL_DB;
let curUser = "";
let isDataLoaded = false;
let editingIdx = null;   // index in h[] currently being edited

// ── CLOUD ──────────────────────────────────────────────
async function initCloud() {
  try {
    const res  = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers:{'X-Master-Key':API_KEY} });
    const data = await res.json();
    if (data.record && data.record.dor) db = data.record;
    else saveToCloud();
    document.getElementById('cloud-status').innerText = "מחובר לענן! ✅";
    setTimeout(() => document.getElementById('cloud-status').style.display='none', 2500);
  } catch(e) {
    document.getElementById('cloud-status').innerText = "❌ שגיאה בהתחברות לענן";
  }
  isDataLoaded = true;
}

async function saveToCloud() {
  const s = document.getElementById('cloud-status');
  s.style.display='block'; s.innerText="שומר בענן... ⏳";
  try {
    await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},
      body: JSON.stringify(db)
    });
    s.innerText="נשמר! ✅";
    setTimeout(()=>s.style.display='none',2000);
  } catch(e) { alert("שגיאה בשמירה!"); }
}

// ── LOGIN ──────────────────────────────────────────────
function preLogin(u) {
  if (!isDataLoaded) return alert("אנא המתן...");
  curUser = u;
  document.getElementById('pin-box').style.display = 'block';
}
function checkPass() {
  if (document.getElementById('pass-in').value === db[curUser].p) {
    document.getElementById('login-scr').style.display  = 'none';
    document.getElementById('acc-scr').style.display    = 'block';
    document.getElementById('hello-text').innerText = "שלום " + (curUser==='dor'?'דור':'יובל');
    refresh(false);
  } else alert("טעות");
}

// ── TIPS / SOUNDS ──────────────────────────────────────
const TIPS = ["כסף שלא מבזבזים היום שווה יותר מחר.","ריבית היא הקסם שגורם לכסף לעבוד.","כיבוי אורות חוסך כסף.","השקעה חכמה מביאה רווחים."];
let tIdx = 0;
setInterval(()=>{ const b=document.getElementById('tip-box'); if(b){b.innerText="💡 "+TIPS[tIdx]; tIdx=(tIdx+1)%TIPS.length;} },10000);

function playSound(type) {
  const s={plus:"https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3",minus:"https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3",approve:"https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3",interest:"https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"};
  new Audio(s[type]).play().catch(()=>{});
}

// ── GOAL ───────────────────────────────────────────────
function syncGoalRange(v){ db[curUser].g=parseInt(v)||0; refresh(true); }
function syncGoalInput(v){ document.getElementById('goal-input').value=v; db[curUser].g=parseInt(v); refresh(true); }

// ── INTEREST ───────────────────────────────────────────
function requestInterest() {
  const m = new Date().getMonth()+"-"+new Date().getFullYear();
  if (db[curUser].lastInt===m) return alert("כבר ביקשת החודש");
  const bonus = Math.floor(db[curUser].b*(0.04/12));
  db[curUser].h.unshift({d:"ריבית חודשית",a:bonus,t:"plus",approved:false,isInt:true,mTag:m});
  playSound('interest'); refresh(true);
}

// ── ADD TRANSACTION ────────────────────────────────────
function update(t) {
  const v=parseInt(document.getElementById('new-amt').value);
  const d=document.getElementById('new-desc').value;
  if (!v||!d) return alert("מלא פרטים");
  db[curUser].h.unshift({d,a:v,t,approved:false});
  playSound(t);
  document.getElementById('new-amt').value='';
  document.getElementById('new-desc').value='';
  refresh(true);
}

// ── PARENT AUTH HELPER ─────────────────────────────────
// returns true if password from a given input id is correct, with alert on fail
function checkAdminPass(inputId) {
  const val = document.getElementById(inputId).value;
  if (val === ADMIN_PASS) return true;
  alert("סיסמת הורה שגויה");
  return false;
}

// ── APPROVE / DENY per pending item ───────────────────
// Each pending item gets its own hidden auth input rendered dynamically
let pendingPassInputs = {}; // keyed by idx

function approveOne(idx) {
  const pass = document.getElementById('pp-'+idx)?.value;
  if (pass !== ADMIN_PASS) return alert("סיסמת הורה שגויה");
  const item = db[curUser].h[idx];
  item.approved = true;
  db[curUser].b += (item.t==='plus' ? item.a : -item.a);
  if (item.isInt) db[curUser].lastInt = item.mTag;
  playSound('approve'); refresh(true);
}

function denyOne(idx) {
  const pass = document.getElementById('pp-'+idx)?.value;
  if (pass !== ADMIN_PASS) return alert("סיסמת הורה שגויה");
  const item = db[curUser].h[idx];
  if (!confirm(`לדחות את "${item.d}"?`)) return;
  db[curUser].h.splice(idx,1);
  refresh(true);
}

// ── APPROVE ALL ────────────────────────────────────────
function adminApproveAll() {
  if (!checkAdminPass('admin-pass-in')) return;
  db[curUser].h.forEach(i=>{
    if (!i.approved){
      i.approved=true;
      db[curUser].b+=(i.t==='plus'?i.a:-i.a);
      if(i.isInt) db[curUser].lastInt=i.mTag;
    }
  });
  playSound('approve');
  document.getElementById('admin-pass-in').value='';
  refresh(true);
}

// ── EDIT MODAL ─────────────────────────────────────────
function openEdit(idx) {
  editingIdx = idx;
  const item = db[curUser].h[idx];
  document.getElementById('modal-pass').value  = '';
  document.getElementById('modal-amt').value   = item.a;
  document.getElementById('modal-desc').value  = item.d;
  document.getElementById('editModal').classList.add('open');
}

function closeModal() {
  editingIdx = null;
  document.getElementById('editModal').classList.remove('open');
}

function saveEdit() {
  if (!checkAdminPass('modal-pass')) return;
  const newAmt  = parseInt(document.getElementById('modal-amt').value);
  const newDesc = document.getElementById('modal-desc').value.trim();
  if (!newAmt || !newDesc) return alert("מלא את כל השדות");

  const item    = db[curUser].h[editingIdx];
  const wasApproved = item.approved;

  // if approved, patch the balance difference
  if (wasApproved) {
    const oldEffect = item.t==='plus' ? item.a : -item.a;
    const newEffect = item.t==='plus' ? newAmt : -newAmt;
    db[curUser].b  += (newEffect - oldEffect);
  }

  item.a = newAmt;
  item.d = newDesc;

  closeModal();
  refresh(true);
}

// ── REFRESH / RENDER ───────────────────────────────────
function refresh(shouldSave=false) {
  const u = db[curUser];
  document.getElementById('bal-val').innerText      = u.b.toLocaleString();
  document.getElementById('goal-input').value        = u.g;
  document.getElementById('goal-range').value        = Math.min(u.g,20000);
  const p = u.g>0 ? Math.floor((u.b/u.g)*100) : 0;
  document.getElementById('bar-fill').style.width    = Math.min(p,100)+"%";
  document.getElementById('bar-fill').innerText      = p+"%";

  // PENDING
  const pending = u.h.map((item,i)=>({item,i})).filter(({item})=>!item.approved);
  const ps = document.getElementById('pending-section');
  ps.style.display = pending.length ? 'block' : 'none';
  document.getElementById('pending-list').innerHTML = pending.map(({item,i})=>`
    <div class="pending-item">
      <span class="pending-label">${item.t==='plus'?'➕':'➖'} ${item.d}: <strong>${item.a}₪</strong></span>
      <div class="pending-btns">
        <button class="p-btn p-edit" onclick="openEdit(${i})">✎</button>
        <button class="p-btn p-approve" onclick="approveOne(${i})">✓</button>
        <button class="p-btn p-deny" onclick="denyOne(${i})">✕</button>
      </div>
    </div>
    <div style="padding:4px 0 6px;">
      <input type="password" id="pp-${i}" placeholder="סיסמת הורה" inputmode="numeric"
        style="font-size:.78rem;padding:6px;margin:0;border-radius:8px;">
    </div>
  `).join('');

  // HISTORY (approved)
  document.getElementById('hist-view').innerHTML = u.h
    .map((item,i)=>({item,i}))
    .filter(({item})=>item.approved)
    .map(({item,i})=>`
      <div class="history-item">
        <span class="h-label">${item.d}</span>
        <button class="h-edit" onclick="openEdit(${i})">✎ הורה</button>
        <span class="h-amount ${item.t}">${item.t==='plus'?'+':'-'}${item.a}₪</span>
      </div>
    `).join('');

  if (shouldSave) saveToCloud();
}

// close modal on overlay click
document.getElementById('editModal').addEventListener('click', function(e){
  if (e.target===this) closeModal();
});

// ── INIT ───────────────────────────────────────────────
initCloud();
</script>
</body>
</html>
